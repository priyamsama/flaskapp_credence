{% extends "base.html" %} {% block title %}Reporting{% endblock %} {% block
content %}

<section class="form-panel">
  <h2>{{ 'Edit Report' if mode == 'edit' else 'Create Report' }}</h2>

  <form method="POST" class="form-grid">
    <label>
      Report ID
      <input
        type="text"
        name="report_id"
        value="{{ report.report_id if report else '' }}"
        {%
        if
        mode=""
        ="edit"
        %}readonly{%
        endif
        %}
        placeholder="e.g. R000001"
        required
      />
    </label>

    <br />

    <label>
      Patient ID
      <select name="patient_id" required>
        <option value="">Select Patient</option>

        {% for patient in patients %}
        <option
          value="{{ patient.patient_id }}"
          {%
          if
          report
          and
          report.patient_id=""
          ="patient.patient_id"
          %}
          selected
          {%
          endif
          %}
        >
          {{ patient.patient_id }} - {{ patient.patient_name }}
        </option>
        {% endfor %}
      </select>
    </label>

    <br />

    <label class="full-width">
      Draft Report
      <textarea
        name="draft_text"
        rows="12"
        placeholder="Write report findings here..."
        required
      >
{{ report.draft_text if report else '' }}</textarea
      >
    </label>

    <br />

    <label class="full-width">
      Comments
      <textarea name="comments" rows="4" placeholder="Additional comments...">
{{ report.comments if report else '' }}</textarea
      >
    </label>

    <br />

    <label>
      Status
      <select name="report_status">
        <option
          value="Pending"
          {%
          if
          report
          and
          report.report_status=""
          ="Pending"
          %}
          selected
          {%
          endif
          %}
        >
          Pending
        </option>

        <option
          value="Delivered"
          {%
          if
          report
          and
          report.report_status=""
          ="Delivered"
          %}
          selected
          {%
          endif
          %}
        >
          Delivered
        </option>
      </select>
    </label>

    <br />

    <div class="button">
      <button type="submit">
        {{ 'Update Report' if mode == 'edit' else 'Create Report' }}
      </button>
    </div>
  </form>
</section>

{% endblock %}
