{% extends "base.html" %}

{% block title %}Patients{% endblock %}

{% block content %}

<section class="breadcrumb">
    <a href="{{ url_for('dashboard') }}">Home</a>
    <span>/</span>
    <a href="{{ url_for('patient') }}">Patients</a>
    <span>/</span>
    <span>Register</span>
</section>

<section class="page-header">
    <div>
        <p class="eyebrow">Patient Module</p>
        <h1>{{ 'Update Patient' if mode == 'edit' else 'Register Patient' }}</h1>
    </div>
    {% if mode == 'edit' %}
        <label>
            Patient ID
            <input type="text" value="{{ patient.patient_id }}" disabled>
        </label>
    {% else %}
    {% endif %}
    
</section>

<section class="form-panel">
    <form method="POST" class="form-grid">
        <label>
            Patient Name
            <input type="text" name="patient_name" value="{{ patient.patient_name if patient else '' }}" placeholder="e.g. John Doe" required>
        </label>
        <label>
            Patient NIC
            <input type="text" name="id" value="{{ patient.id if patient else '' }}" placeholder="NIC number here.. ">
        </label>
        <label>
            Age
            <input type="number" name="age" min="0" max="120" value="{{ patient.age if patient else '' }}" placeholder="e.g. 30" required>
        </label>

        <label>
            Gender
            <select name="gender" required>
                <option value="">Select gender</option>
                {% for gender in ['Male', 'Female', 'Other'] %}
                <option value="{{ gender }}" {% if patient and patient.gender == gender %}selected{% endif %}>{{ gender }}</option>
                {% endfor %}
            </select>
        </label>

        <label class="full-width">
            Contact Number
            <input type="text" name="contact_number" value="{{ patient.contact_number if patient else '' }}" placeholder="e.g. 0712345601 (exactly 10 digits)" required>
        </label>

        <div class="form-actions">
            <button type="submit">{{ 'Update Patient' if mode == 'edit' else 'Save Changes' if mode == 'edit' else 'Register Patient' }}</button>
        </div>
    </form>
</section>

{% endblock %}
