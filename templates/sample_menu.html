{% extends "base.html" %}

{% block title %}Samples{% endblock %}

{% block content %}

<section class="breadcrumb">
    <a href="{{ url_for('dashboard') }}">Home</a>
    <span>/</span>
    <span>Samples</span>
</section>

<section class="module-area">
    <article class="module-card">
        <div class="module-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <h2>Register</h2>
        <p>Enter Sample Details</p>
        <a class="button secondary" href="{{ url_for('register_sample') }}">Register</a>
    </article>

    <article class="module-card">
        <div class="module-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <h2>Update</h2>
        <p>Update Sample Details</p>
        <a class="button secondary" href="{{ url_for('sample_update') }}">Update</a>
    </article>

    <article class="module-card">
        <div class="module-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <h2>Search</h2>
        <p>Search Sample Details</p>
        <a class="button secondary" href="{{ url_for('sample_search') }}">Search</a>
    </article>
</section>
{% endblock %}
